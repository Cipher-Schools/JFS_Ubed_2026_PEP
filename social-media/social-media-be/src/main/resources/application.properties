spring.application.name=social-media-be
spring.devtools.restart.enabled=true

# Database Configuration
# Use environment variables for credentials - Set these in your .env file or system environment
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/social_media_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
#updates old db

#spring.jpa.hibernate.ddl-auto=create
#flush old db & recreates entire database

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

